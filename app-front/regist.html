<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    link
</head>
<body>
    <div id="central-box">
        <div class="side1"></div>
        <div class="side2">
            <p>Welcome to <span>MONOPÓLIO FC</span></p>
            <h1>Sign Up</h1>

            <div>
            <form id="formulario">
                <label for="email">Enter your email address:</label>
                <input type="email" id="email" name="email" required>

                <div class="contact-info">
                    <div class="contact-field"> 
                        <label for="username">Enter your username:</label>
                        <input type="text" id="username" name="username" required>
                    </div>

                    <div class="contact-field">
                        <label for="contact">Enter your phone number:</label>
                        <input type="number" id="contact" pattern="^(9(1|2|3|4|5|9|0)[0-9]{7})$" name="contact" required>
                    </div>
                </div>

                <label for="password">Enter your password:</label>
                <input type="password" id="password" name="password" required>


                <div class="sign-up-regist">
                    <div  class="sign-up-option">
                        <p class="no">Have an Account?</p>
                        <a href="index.html">Sign In</a>
                    </div>
                    <button type="submit" id="submit-btn">Sign Up</button>
                </div>
                
            </form>
        </div> 
        </div>
        <img src="assets/logo.png" alt="" class="logo">
    </div>

    <table id="data-table">
        <tr>
            <th>Email</th>
            <th>Username</th>
            <th>Contact</th>
            <th>Password</th>
        </tr>
    </table>

    <script src="script.js"></script>

</body>
</html>
