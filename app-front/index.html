<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="central-box">
        <div class="side1"></div>
        <div class="side2">
            <p>Welcome to <span>MONOPÓLIO FC</span></p>
            <h1>Sign In</h1>

            <div class="sign-google">
                <img src="assets/google.png" alt="Logo do Google">
                <p class="p-google">Sign in with Google </p>
            </div>

            <div>
            <form action="">
                <label for="username">Enter your username or email address:</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Enter your password:</label>
                <input type="password" id="password" name="password" required>


                <div class="sign-up">
                    <div  class="sign-up-option">
                        <p class="no">No Account?</p>
                        <p>Sign up</p>
                    </div>
                    <button type="submit">Sign In</button>
                </div>
                
            </form>
        </div> 
        </div>
        <img src="assets/logo.png" alt="" class="logo">

               
    </div>

</body>
</html>
